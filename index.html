<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#e5302a">
  <title>슈퍼리치키드 하계 MT</title>
  <meta name="description" content="슈리키 하계 MT — 함께 결정하고 정산하는 크루 페이지">
  <link rel="icon" type="image/svg+xml" href="favicon.svg?v=20260617135333">
  <link rel="icon" type="image/png" href="favicon.png?v=20260617135333">
  <link rel="apple-touch-icon" href="favicon.png?v=20260617135333">
  <!-- 한글 타이포그래피 (없으면 시스템 폰트로 자동 폴백) -->
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
  <link rel="stylesheet" href="styles.css?v=20260617135333">
</head>
<body>
  <div id="app">
    <header id="app-header"></header>
    <main id="app-main"></main>
    <nav id="app-nav"></nav>
  </div>

  <!-- 이름 선택 게이트 -->
  <div id="gate" class="hidden"></div>
  <!-- 모달 -->
  <div id="modal-root"></div>
  <!-- 사진 업로드용 숨김 입력 -->
  <input id="photo-file" type="file" accept="image/*,video/*" multiple style="display:none">
  <input id="avatar-file" type="file" accept="image/*" style="display:none">
  <input id="hero-file" type="file" accept="image/*" style="display:none">

  <!-- Firebase (실시간 동기화). config.js의 firebase 값이 비어 있으면 사용되지 않음(데모 모드) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <!-- 사진 일괄 다운로드(zip)용 -->
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>

  <script src="config.js?v=20260617135333"></script>
  <script src="app.js?v=20260617135333"></script>
</body>
</html>
