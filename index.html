<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#2d5bff">
  <title>크루핏 (CREWFIT)</title>
  <meta name="description" content="동호회 일정·참석·정산·투표를 한 곳에서.">
  <!-- 링크 미리보기 (Open Graph / 카톡·메신저 썸네일) -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="크루핏">
  <meta property="og:title" content="크루핏 (CREWFIT)">
  <meta property="og:description" content="동호회 일정·참석·정산·투표를 한 곳에서.">
  <meta property="og:image" content="https://greencar-uxd.github.io/crewfit/og-cover.png?v=20260619121112">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:url" content="https://greencar-uxd.github.io/crewfit/">
  <meta property="og:locale" content="ko_KR">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="크루핏 (CREWFIT)">
  <meta name="twitter:description" content="동호회 일정·참석·정산·투표를 한 곳에서.">
  <meta name="twitter:image" content="https://greencar-uxd.github.io/crewfit/og-cover.png?v=20260619121112">
  <link rel="icon" type="image/svg+xml" href="favicon.svg?v=20260619121112">
  <link rel="icon" type="image/png" sizes="512x512" href="favicon.png?v=20260619121112">
  <link rel="icon" type="image/x-icon" href="favicon.ico?v=20260619121112">
  <link rel="apple-touch-icon" href="favicon.png?v=20260619121112">
  <!-- 한글 타이포그래피 (없으면 시스템 폰트로 자동 폴백) -->
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600;700&display=swap">
  <script>document.write('<link rel="stylesheet" href="styles.css?v='+Math.floor(Date.now()/60000)+'">');</script>
</head>
<body>
  <a class="skip-link" href="#app-main">본문 바로가기</a>
  <div id="app">
    <header id="app-header"></header>
    <main id="app-main" tabindex="-1"></main>
    <nav id="app-nav"></nav>
  </div>

  <!-- 이름 선택 게이트 -->
  <div id="gate" class="hidden"></div>
  <!-- 모달 -->
  <div id="modal-root"></div>
  <!-- 사진 업로드용 숨김 입력 -->
  <input id="photo-file" type="file" accept="image/*,video/*" multiple style="display:none">
  <input id="avatar-file" type="file" accept="image/*" style="display:none">
  <input id="hero-file" type="file" accept="image/*" style="display:none">

  <!-- Firebase (실시간 동기화). config.js의 firebase 값이 비어 있으면 사용되지 않음(데모 모드) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <!-- 사진 일괄 다운로드(zip)용 -->
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>

  <script>(function(){var v=Math.floor(Date.now()/60000);document.write('<script src="config.js?v='+v+'"><\/script><script src="app.js?v='+v+'"><\/script>');})();</script>
</body>
</html>
